# Reemplaza TU_IP_VPS si aún no usas dominio en el server_name temporal.
# Tras certbot, usa: server_name archstacksoftware.com www.archstacksoftware.com;

server {
    listen 80;
    listen [::]:80;
    server_name archstacksoftware.com www.archstacksoftware.com;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type "text/plain";
    }

    location / {
        proxy_pass http://127.0.0.1:3050;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
